<div>
  <div class="flex items-center justify-center w-full">
    <app-block>
      <div class="flex w-full justify-center">
        <img
          class="h-24 md:h-[12vw] object-contain object-center 3xl:mb-10"
          src="okno_submit.png"
          alt="OKNO*SUBMIT"
        />
      </div>

      <p class="font-main text-pink-500 text-5xl md:text-[5vw] text-center">ЗАПОЛНИТЕ ФОРМУ</p>

      <br />
      <input
        id="name"
        type="text"
        [formControl]="name"
        [maxLength]="36"
        placeholder="Название"
        class="bg-white text-blue-700 font-main text-2xl md:text-[2vw] text-center border-5 3xl:border-8 border-pink-400 focus:outline-pink-50 focus:ring-0 w-full mb-2 3xl:mb-8"
      />

      <input
        id="link"
        type="text"
        [formControl]="link"
        [maxLength]="60"
        placeholder="Ссылка на игру"
        class="bg-white text-blue-700 font-main text-2xl md:text-[2vw] text-center border-5 3xl:border-8 border-pink-400 focus:outline-pink-50 focus:ring-0 w-full mb-2 3xl:mb-8"
      />

      <textarea
        id="additionalInfo"
        type="text"
        [formControl]="additionalInfo"
        [maxLength]="450"
        rows="6"
        placeholder="Кратко опишите ваш проект"
        class="bg-white text-blue-700 font-main text-2xl md:text-[2vw] text-center border-5 3xl:border-8 border-pink-400 focus:outline-pink-50 focus:ring-0 w-full mb-2 3xl:mb-8"
      ></textarea>

      <input
        id="contacts"
        type="text"
        [formControl]="contacts"
        [maxLength]="60"
        placeholder="Контакты"
        class="bg-white text-blue-700 font-main text-2xl md:text-[2vw] text-center border-5 3xl:border-8 border-pink-400 focus:outline-pink-50 focus:ring-0 w-full mb-2 3xl:mb-8"
      />
      <button
        class="bg-pink-500 hover:bg-pink-400 active:bg-pink-600 text-white items-center font-main text-4xl md:text-[4vw] hover:cursor-pointer w-full"
        (click)="submit()"
      >
        <b> *submit*</b>
      </button>
      <br />
      <br />

      <p class="mb-2 font-main text-blue-600 text-center text-sm md:text-[2vw]">
        * Ваши контакты не публикуются. В случае тех. неполадок с вашей игрой, мы обратимся по этим
        контактам. Вы можете оставить это поле пустым
      </p>
    </app-block>
  </div>
</div>
